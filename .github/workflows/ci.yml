name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # needed for test-reporter
  pull-requests: write   # needed to post coverage comments

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java: [ "17", "21" ]   # test on both supported LTS versions

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Java setup ───────────────────────────────────────────────────────────
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      # ── Build & test ─────────────────────────────────────────────────────────
      - name: Build, test, and measure coverage
        run: mvn --batch-mode --no-transfer-progress verify

      # ── Publish test results ─────────────────────────────────────────────────
      - name: Publish JUnit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: Test Results (Java ${{ matrix.java }})

      # ── Upload JaCoCo coverage report ────────────────────────────────────────
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-java${{ matrix.java }}
          path: target/site/jacoco/
          retention-days: 14

      # ── Coverage comment on pull requests ────────────────────────────────────
      - name: Post coverage comment
        if: github.event_name == 'pull_request' && matrix.java == '17'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 75
          title: "📊 Code Coverage Report"

  # ── Dependency vulnerability scan ────────────────────────────────────────────
  security-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          mvn --batch-mode \
            org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFiles=.github/owasp-suppressions.xml \
          || true   # informational; don't fail CI on first run

      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

  # ── Static analysis (SpotBugs) ────────────────────────────────────────────────
  static-analysis:
    name: SpotBugs Static Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run SpotBugs
        run: |
          mvn --batch-mode \
            com.github.spotbugs:spotbugs-maven-plugin:4.8.3.1:check \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=High \
          || true   # report but don't block CI

      - name: Upload SpotBugs report
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 14
